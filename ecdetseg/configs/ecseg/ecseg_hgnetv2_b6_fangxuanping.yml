__include__: [
  '../ecdet/ecdet_hgnetv2_b6.yml',
  'ecseg_hgnetv2.yml',
  '../dataset/fangxuanping.yml',
]

output_dir: outputs/ecseg_hgnetv2_b6_fangxuanping

use_amp: true

print_freq: 100

eval_spatial_size: [512, 512] # h w

ECSeg:
  backbone: HGNetV2

train_dataloader:
  total_batch_size: 2      # 全局 Batch Size（需根据显存容量调整）
  dataset:
    transforms:
      ops:
        - {type: Mosaic, output_size: 256, rotation_range: 10, translation_range: [0.1, 0.1], scaling_range: [0.5, 1.5],
           fill_value: 0, max_cached_images: 50, random_pop: True}
        - {type: RandomPhotometricDistort, p: 0.5}
        - {type: RandomZoomOut, fill: 0}
        - {type: RandomIoUCrop, p: 0.8}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: RandomHorizontalFlip}
        - {type: Resize, size: [512, 512]}
        - {type: SanitizeBoundingBoxes, min_size: 1}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
        - {type: ConvertBoxes, fmt: 'cxcywh', normalize: True}
      policy: stop_epoch
      mosaic_epoch: 24
      mosaic_prob: 0.75
      stop_epoch: 48
      remove_ops: ['Mosaic', 'RandomPhotometricDistort', 'RandomZoomOut', 'RandomIoUCrop']

  collate_fn:
    type: BatchImageCollateFunction
    mixup_prob: 0.75
    mixup_epoch: 24

val_dataloader:
  total_batch_size: 4
  dataset:
    transforms:
      ops:
        - {type: Resize, size: [512, 512]}
        - {type: ConvertPILImage, dtype: 'float32', scale: True}
        - {type: Normalize, mean: [0.485, 0.456, 0.406], std: [0.229, 0.224, 0.225]}
      policy: default

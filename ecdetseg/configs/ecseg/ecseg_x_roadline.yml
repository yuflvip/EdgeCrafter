__include__: [
  '../ecdet/ecdet_x.yml',
  'ecseg.yml',
  '../dataset/segment_roadline.yml',
]

output_dir: outputs/ecseg_x_roadline

ViTAdapter:
  name: ecseg_vitsplus
  weights_path: ecvits/ecseg_vitsplus.pth

eval_spatial_size: [512, 512] # h w


optimizer:
  type: AdamW
  params: 
    -
      # except norm/bn/bias in backbone
      params: '^(?=.*.backbone)(?!.*(?:norm|bn|bias)).*$'  
      lr: 0.000025
    -
      # including all norm/bn/bias in backbone
      params: '^(?=.*.backbone)(?=.*(?:norm|bn|bias)).*$'    
      lr: 0.000025
      weight_decay: 0.
    - 
      # including all norm/bn/bias except for the backbone
      params: '^(?!.*\.backbone)(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.000125

epochs: 400                 # 总训练轮数。COCO 6x 策略（1x = 12 轮）外加 2 轮关闭增强的微调
warmup_iter: 2000         # 学习率预热步数
lr_gamma: 0.5             # 学习率衰减率

train_dataloader:
  total_batch_size: 32      # 全局 Batch Size（需根据显存容量调整）
  dataset:
    transforms:
      mosaic_epoch: 183       # Mosaic 增强截止轮次。通常建议设为 stop_epoch 的一半。
      mosaic_prob: 0.75       # Mosaic 增强触发概率
      stop_epoch: 396         # 增强停止轮次（最后 2 轮通常关闭数据增强以利于收敛）

  collate_fn:
    mixup_prob: 0.75          # MixUp 增强概率
    mixup_epoch: 183          # MixUp 增强截止轮次

val_dataloader:
    total_batch_size: 32
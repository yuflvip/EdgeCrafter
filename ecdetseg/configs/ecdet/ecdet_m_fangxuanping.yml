__include__: [
  '../dataset/fangxuanping.yml',
  'ecdet.yml',
]

output_dir: outputs/ecdet_m_fangxuanping


ViTAdapter:
  name: ecvittplus
  embed_dim: 256
  num_heads: 4
  interaction_indexes: [10, 11]  
  weights_path: ecvits/ecvittplus.pth

HybridEncoder:
  in_channels: [256, 256, 256]
  depth_mult: 0.67
  expansion: 0.75
  hidden_dim: 256
  dim_feedforward: 512
  act: silu

ECTransformer:
  activation: silu
  feat_channels: [256, 256, 256]
  hidden_dim: 256
  dim_feedforward: 1024
  num_layers: 4 
  eval_idx: -1  


optimizer:
  type: AdamW

  params: 
    -
      # except norm/bn/bias in backbone
      params: '^(?=.*.backbone)(?!.*(?:norm|bn|bias)).*$'  
      lr: 0.000025
    -
      # including all norm/bn/bias in backbone
      params: '^(?=.*.backbone)(?=.*(?:norm|bn|bias)).*$'    
      lr: 0.000025
      weight_decay: 0.
    - 
      # including all norm/bn/bias except for the backbone
      params: '^(?!.*\.backbone)(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0005
  betas: [0.9, 0.999]
  weight_decay: 0.0001

epochs: 62 
warmup_iter: 2000
lr_gamma: 0.5

eval_spatial_size: [640, 640] # h w


train_dataloader:
  dataset: 
    transforms:
      mosaic_epoch: 30
      mosaic_prob: 0.75
      stop_epoch: 60

  collate_fn:
    mixup_prob: 0.75
    mixup_epoch: 30

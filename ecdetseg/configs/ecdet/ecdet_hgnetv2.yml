task: detection

model: ECDet
criterion: ECCriterion
postprocessor: PostProcessor

use_focal_loss: True
checkpoint_freq: 5    # save freq


####################################################### MODEL CONFIG ########################################################

ECDet:
  backbone: HGNetV2
  encoder: HybridEncoder
  decoder: ECTransformer

HybridEncoder:
  in_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]

  # intra
  hidden_dim: 256
  use_encoder_idx: [2]
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 1024
  dropout: 0.

  # cross
  expansion: 1.0
  depth_mult: 1
  act: silu

  # New
  csp_type: csp2
  fuse_op: sum

ECTransformer:
  feat_channels: [256, 256, 256]
  feat_strides: [8, 16, 32]
  hidden_dim: 256
  num_levels: 3

  num_layers: 4
  eval_idx: -1
  num_queries: 300

  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0

  reg_max: 32
  reg_scale: 4
  layer_scale: 1

  num_points: [3, 6, 3]
  cross_attn_method: default
  query_select_method: default

  # Act
  activation: silu

  # FFN
  dim_feedforward: 1024

PostProcessor:
  num_top_queries: 300

## Loss
ECCriterion:
  weight_dict: {loss_mal: 1, loss_bbox: 5, loss_giou: 2, loss_fgl: 0.15, loss_ddf: 1.5}
  losses: ['mal', 'boxes', 'local']
  gamma: 1.5
  alpha: 0.75
  reg_max: 32

  matcher:
    type: HungarianMatcher
    weight_dict: {cost_class: 2, cost_bbox: 5, cost_giou: 2}
    alpha: 0.25
    gamma: 2.0
